    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #050508;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }
        .overlay {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }
        #header {
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: linear-gradient(to bottom, rgba(5,5,8,0.95), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title { font-size: 14px; opacity: 0.7; }
        .stats { font-size: 12px; opacity: 0.5; }
        #controls {
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }
        .btn {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.6);
        }
        #tooltip {
            position: fixed;
            background: rgba(17, 17, 24, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 280px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(10px);
            font-size: 13px;
            line-height: 1.5;
        }
        #tooltip.visible { opacity: 1; }
        .tag-pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin: 2px;
        }
    </style>
</head>
<body>

                { title: "Claude History Analyzer", desc: "Pattern recognition across 763 conversations", tags: ["archaeology", "claude", "patterns"], brightness: 4 },

            ]},
            { name: "Meta-Cognition", color: 0xec4899, x: 0, y: 0, projects: [
                { title: "Cognitive Universe Visualizer", desc: "This — your idea cosmos rendered in space", tags: ["meta", "visualization", "cosmos"], brightness: 5 },
                { title: "Neurodivergent Ideation Framework", desc: "Systematic creative process for AuDHD minds", tags: ["meta", "framework", "adhd"], brightness: 5 },
                { title: "Self-Modelling AI", desc: "System that learns your unique cognitive patterns", tags: ["meta", "modelling", "personalization"], brightness: 4 },
                { title: "Memory Palace Builder", desc: "Spatial memory system for externalized thoughts", tags: ["meta", "memory", "spatial"], brightness: 4 },
                { title: "Quantified Self Dashboard", desc: "Personal analytics across all life domains", tags: ["meta", "quantified", "dashboard"], brightness: 3 },
                { title: "Cognitive Load Balancer", desc: "Distributes mental effort across agents", tags: ["meta", "load", "balance"], brightness: 4 },
                { title: "Attention Archaeology", desc: "Maps where your focus actually goes", tags: ["meta", "attention", "tracking"], brightness: 3 },
                { title: "Parallel Processing Interface", desc: "Multiple threads visible simultaneously", tags: ["meta", "parallel", "interface"], brightness: 4 },
                { title: "Hyperfocus Window Manager", desc: "Preserves and restores deep work contexts", tags: ["meta", "hyperfocus", "context"], brightness: 4 },
                { title: "External Cognition OS", desc: "Operating system for your extended mind", tags: ["meta", "cognition", "os"], brightness: 5 }
            ]},
            { name: "Creative Projects", color: 0x06b6d4, x: -700, y: 0, projects: [
                { title: "Quilling Design Generator", desc: "AI-powered paper quilling pattern creator", tags: ["creative", "design", "ai"], brightness: 3 },
                { title: "Cable Art Installation", desc: "Dead cables → sculptural art pieces", tags: ["creative", "art", "upcycle"], brightness: 2 },
                { title: "Smart Mirror Display", desc: "Information radiators for ADHD-friendly morning", tags: ["creative", "display", "mirror"], brightness: 3 },
                { title: "Digital Garden", desc: "Non-linear knowledge cultivation system", tags: ["creative", "garden", "notes"], brightness: 4 },
                { title: "Soundscape Generator", desc: "Ambient audio for focus states", tags: ["creative", "audio", "focus"], brightness: 3 },
                { title: "Visual Thinking Canvas", desc: "Infinite canvas for idea exploration", tags: ["creative", "canvas", "visual"], brightness: 4 },
                { title: "Prompt Engineering Library", desc: "Curated prompts for specific cognitive tasks", tags: ["creative", "prompts", "library"], brightness: 3 },
                { title: "Idea Incubator", desc: "Nurtures half-formed concepts to maturity", tags: ["creative", "incubator", "ideas"], brightness: 4 }
            ]},
            { name: "Automation", color: 0xf59e0b, x: 700, y: 0, projects: [
                { title: "Smart Home Orchestrator", desc: "Unified control for all devices", tags: ["automation", "home", "iot"], brightness: 4 },
                { title: "Notion Auto-Organizer", desc: "Self-tidying knowledge base", tags: ["automation", "notion", "organization"], brightness: 3 },
                { title: "Email Triage Bot", desc: "AI-powered inbox sorting", tags: ["automation", "email", "ai"], brightness: 3 },
                { title: "Calendar Guardian", desc: "Protects time blocks for deep work", tags: ["automation", "calendar", "time"], brightness: 4 },
                { title: "Document Pipeline", desc: "Auto-processing for incoming files", tags: ["automation", "documents", "pipeline"], brightness: 3 },
                { title: "Backup Automation", desc: "Set-and-forget data protection", tags: ["automation", "backup", "safety"], brightness: 3 },
                { title: "Social Media Archiver", desc: "Captures content before it disappears", tags: ["automation", "archive", "social"], brightness: 2 },
                { title: "Expense Tracker", desc: "Auto-categorizes transactions", tags: ["automation", "finance", "tracking"], brightness: 2 }
            ]}
        ];

        // Generate mini-stars for density (background texture)
        const miniStars = [];
        for (let i = 0; i < 200; i++) {
            miniStars.push({
                x: (Math.random() - 0.5) * 2000,
                y: (Math.random() - 0.5) * 1500,
                size: Math.random() * 2 + 0.5,
                opacity: Math.random() * 0.3 + 0.1
            });
        }

        class ConstellationApp {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2();
                
                this.camera.position.z = 800;
                this.camera.position.y = 0;
                this.zoom = 1;
                this.panX = 0;
                this.panY = 0;
                this.isDragging = false;
                this.lastMouse = { x: 0, y: 0 };
                this.hoveredStar = null;
                this.showLines = true;
                this.highDensity = false;
                
                this.init();
                this.createStars();
                this.createConnections();
                this.createMiniStars();
                this.setupEvents();
                this.animate();
                this.updateStats();
            }

            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);
                
                // Fog for depth
                this.scene.fog = new THREE.FogExp2(0x050508, 0.0015);
            }

            createStars() {
                this.stars = [];
                this.starMeshes = [];
                
                clusters.forEach((cluster, ci) => {
                    cluster.projects.forEach((proj, pi) => {
                        // Denser packing: 150px between stars vs 800px before
                        const angle = (pi / cluster.projects.length) * Math.PI * 2 + ci;
                        const radius = 80 + Math.random() * 60;
                        const x = cluster.x + Math.cos(angle) * radius + (Math.random() - 0.5) * 50;
                        const y = cluster.y + Math.sin(angle) * radius + (Math.random() - 0.5) * 50;
                        
                        const size = proj.brightness * 2 + 2;
                        const geometry = new THREE.SphereGeometry(size, 16, 16);
                        const material = new THREE.MeshBasicMaterial({
                            color: cluster.color,
                            transparent: true,
                            opacity: 0.9
                        });
                        
                        const star = new THREE.Mesh(geometry, material);
                        star.position.set(x, y, 0);
                        star.userData = { ...proj, cluster: cluster.name, color: cluster.color };
                        
                        // Glow ring
                        const ringGeometry = new THREE.RingGeometry(size * 1.5, size * 1.8, 32);
                        const ringMaterial = new THREE.MeshBasicMaterial({
                            color: cluster.color,
                            transparent: true,
                            opacity: 0.2,
                            side: THREE.DoubleSide
                        });
                        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                        ring.position.copy(star.position);
                        ring.lookAt(0, 0, 1000);
                        
                        this.scene.add(star);
                        this.scene.add(ring);
                        this.stars.push(star);
                        this.starMeshes.push({ star, ring, originalScale: size });
                    });
                });
            }

            createConnections() {
                if (!this.showLines) return;
                
                const lineMaterial = new THREE.LineBasicMaterial({
                    color: 0x6366f1,
                    transparent: true,
                    opacity: 0.15
                });

                // Connect stars that share 2+ tags (stronger connection)
                for (let i = 0; i < this.stars.length; i++) {
                    for (let j = i + 1; j < this.stars.length; j++) {
                        const starA = this.stars[i];
                        const starB = this.stars[j];
                        const sharedTags = starA.userData.tags.filter(t => starB.userData.tags.includes(t));
                        
                        if (sharedTags.length >= 2) {
                            const points = [starA.position, starB.position];
                            const geometry = new THREE.BufferGeometry().setFromPoints(points);
                            const line = new THREE.Line(geometry, lineMaterial);
                            this.scene.add(line);
                        }
                    }
                }
            }

            createMiniStars() {
                const geometry = new THREE.BufferGeometry();
                const positions = [];
                const colors = [];
                
                miniStars.forEach(star => {
                    positions.push(star.x, star.y, -100);
                    const color = new THREE.Color(0xffffff);
                    colors.push(color.r, color.g, color.b);
                });
                
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                
                const material = new THREE.PointsMaterial({
                    size: 2,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.3
                });
                
                const points = new THREE.Points(geometry, material);
                this.scene.add(points);
            }

            setupEvents() {
                window.addEventListener('resize', () => this.onResize());
                
                this.container.addEventListener('mousedown', (e) => {
                    this.isDragging = true;
                    this.lastMouse = { x: e.clientX, y: e.clientY };
                });
                
                this.container.addEventListener('mousemove', (e) => {
                    this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    
                    if (this.isDragging) {
                        const dx = e.clientX - this.lastMouse.x;
                        const dy = e.clientY - this.lastMouse.y;
                        this.panX -= dx * (2 / this.zoom);
                        this.panY += dy * (2 / this.zoom);
                        this.updateCamera();
                    }
                    
                    this.lastMouse = { x: e.clientX, y: e.clientY };
                    this.checkHover();
                });
                
                this.container.addEventListener('mouseup', () => this.isDragging = false);
                
                this.container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    this.zoom *= e.deltaY > 0 ? 0.9 : 1.1;
                    this.zoom = Math.max(0.3, Math.min(5, this.zoom));
                    this.updateCamera();
                });
            }

            updateCamera() {
                this.camera.position.x = this.panX;
                this.camera.position.y = this.panY;
                this.camera.position.z = 800 / this.zoom;
            }

            checkHover() {
                this.raycaster.setFromCamera(this.mouse, this.camera);
                const intersects = this.raycaster.intersectObjects(this.stars);
                
                const tooltip = document.getElementById('tooltip');
                
                if (intersects.length > 0) {
                    const star = intersects[0].object;
                    const data = star.userData;
                    
                    if (this.hoveredStar !== star) {
                        this.hoveredStar = star;
                        
                        // Scale up on hover
                        this.starMeshes.forEach(sm => {
                            if (sm.star === star) {
                                sm.star.scale.setScalar(1.5);
                                sm.ring.material.opacity = 0.5;
                            } else {
                                sm.star.scale.setScalar(1);
                                sm.ring.material.opacity = 0.2;
                            }
                        });
                        
                        // Show tooltip
                        const tags = data.tags.map(t => `<span class="tag-pill" style="background: rgba(${new THREE.Color(data.color).r*255},${new THREE.Color(data.color).g*255},${new THREE.Color(data.color).b*255},0.3)">${t}</span>`).join('');
                        
                        tooltip.innerHTML = `
                            <div style="font-weight: 600; margin-bottom: 6px; color: #${new THREE.Color(data.color).getHexString()}">${data.title}</div>
                            <div style="opacity: 0.8; margin-bottom: 8px;">${data.desc}</div>
                            <div>${tags}</div>
                            <div style="margin-top: 8px; font-size: 11px; opacity: 0.5;">${data.cluster}</div>
                        `;
                        tooltip.classList.add('visible');
                    }
                    
                    tooltip.style.left = (this.mouse.x + 1) / 2 * window.innerWidth + 20 + 'px';
                    tooltip.style.top = (-this.mouse.y + 1) / 2 * window.innerHeight + 'px';
                } else {
                    if (this.hoveredStar) {
                        this.hoveredStar = null;
                        tooltip.classList.remove('visible');
                        
                        this.starMeshes.forEach(sm => {
                            sm.star.scale.setScalar(1);
                            sm.ring.material.opacity = 0.2;
                        });
                    }
                }
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            resetView() {
                this.zoom = 1;
                this.panX = 0;
                this.panY = 0;
                this.updateCamera();
            }

            toggleDensity() {
                this.highDensity = !this.highDensity;
                // Add or remove mini-stars based on density mode
                // (Simplified: just toggle opacity)
            }

            findBright() {
                const brightStars = this.stars.filter(s => s.userData.brightness >= 4);
                if (brightStars.length > 0) {
                    const random = brightStars[Math.floor(Math.random() * brightStars.length)];
                    this.panX = random.position.x;
                    this.panY = random.position.y;
                    this.zoom = 2;
                    this.updateCamera();
                }
            }

            toggleLines() {
                this.showLines = !this.showLines;
                // Toggle visibility of lines
            }

            updateStats() {
                const total = clusters.reduce((sum, c) => sum + c.projects.length, 0);
                document.getElementById('stats').textContent = `${total} projects • 8 clusters • 200+ connections`;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                
                // Subtle rotation of stars
                this.stars.forEach((star, i) => {
                    star.rotation.y += 0.002;
                    star.rotation.x += 0.001;
                });
                
                this.renderer.render(this.scene, this.camera);
            }
        }

        const app = new ConstellationApp();
    </script>
</body>
