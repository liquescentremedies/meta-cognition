<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constellation Mind | Non-Linear Idea Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #ui {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1rem;
            background: linear-gradient(to bottom, rgba(5,5,8,0.9), transparent);
            pointer-events: none;
            z-index: 10;
        }
        .cluster-label {
            position: absolute;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        #hover-info {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            max-width: 400px;
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 1.25rem;
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 20;
        }
        #hover-info.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
            z-index: 20;
        }
        .control-btn {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .control-btn:hover {
            background: rgba(99, 102, 241, 0.4);
        }
        #instructions {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 5;
        }
        #instructions.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <h1 style="font-size: 1.25rem; font-weight: 600;">🌌 Constellation Mind</h1>
        <p style="font-size: 0.875rem; color: #94a3b8; margin-top: 0.25rem;">
            764 ideas • Drag to pan • Scroll to zoom • Hover to connect
        </p>
    </div>
    
    <div id="instructions" class="visible">
        <p style="font-size: 1.5rem; color: rgba(255,255,255,0.4);">
            Drag to explore • Ideas glow when connected
        </p>
    </div>
    
    <div id="hover-info">
        <h3 id="hover-title" style="font-size: 1rem; margin-bottom: 0.5rem; color: #a78bfa;"></h3>
        <p id="hover-desc" style="font-size: 0.875rem; color: #94a3b8; line-height: 1.5;"></p>
        <div id="hover-tags" style="margin-top: 0.75rem; display: flex; gap: 0.5rem; flex-wrap: wrap;"></div>
    </div>
    
    <div class="controls">
        <button class="control-btn" onclick="resetView()">Reset View</button>
        <button class="control-btn" onclick="toggleTrails()">Toggle Trails</button>
        <button class="control-btn" onclick="randomJump()">🎲 Random Jump</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hoverInfo = document.getElementById('hover-info');
        const instructions = document.getElementById('instructions');
        
        let width, height;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let hoveredNode = null;
        let showTrails = true;
        
        // Sample constellation data (your actual clusters)
        const clusters = [
            {
                name: "ADHD Tools",
                color: "#f59e0b",
                nodes: [
                    { id: "adhd1", title: "Pi 4B AI Assistant", desc: "Voice-first ADHD accommodation system", tags: ["voice", "raspberry-pi", "ai"], x: -200, y: -150 },
                    { id: "adhd2", title: "Task Breakdown Engine", desc: "Executive function support for overwhelming tasks", tags: ["executive-function", "planning"], x: -150, y: -100 },
                    { id: "adhd3", title: "Hyperfocus Guard", desc: "Time blindness alerts and exit ramps", tags: ["time", "hyperfocus"], x: -250, y: -80 },
                    { id: "adhd4", title: "Energy Tracker", desc: "Spoon-based task allocation", tags: ["energy", "spoons"], x: -180, y: -50 },
                ]
            },
            {
                name: "Camera Vision",
                color: "#10b981",
                nodes: [
                    { id: "cam1", title: "Clean With Camera", desc: "Visual task detection for cleaning", tags: ["vision", "cleaning", "ai"], x: 200, y: -200 },
                    { id: "cam2", title: "3D Room Scan", desc: "iPhone 3D scanning for spatial memory", tags: ["3d", "scanning", "memory"], x: 280, y: -150 },
                    { id: "cam3", title: "Google Cloud Vision", desc: "Object recognition pipeline", tags: ["cloud", "vision", "api"], x: 150, y: -120 },
                ]
            },
            {
                name: "Agent Systems",
                color: "#6366f1",
                nodes: [
                    { id: "agent1", title: "OpenClaw Orchestrator", desc: "Multi-agent brain fork system", tags: ["agents", "openclaw", "forks"], x: 100, y: 100 },
                    { id: "agent2", title: "Self-Moulding Agent", desc: "Agent that improves itself from usage", tags: ["self-improving", "meta"], x: 200, y: 150 },
                    { id: "agent3", title: "Master Orchestrator", desc: "Distributed cognition coordinator", tags: ["orchestration", "distributed"], x: 50, y: 180 },
                    { id: "agent4", title: "Glimmer Personality", desc: "AuDHD-aware assistant persona", tags: ["persona", "audhd"], x: 150, y: 220 },
                ]
            },
            {
                name: "Data Archaeology",
                color: "#8b5cf6",
                nodes: [
                    { id: "data1", title: "Conversation Fusion", desc: "Claude + ChatGPT + Gemini merger", tags: ["fusion", "unification"], x: -300, y: 100 },
                    { id: "data2", title: "Idea Extractor", desc: "Project/Concept/Accommodation parser", tags: ["extraction", "parsing"], x: -350, y: 180 },
                    { id: "data3", title: "Voice Transcription", desc: "203 Gemini voice files → text", tags: ["voice", "transcription", "batch"], x: -250, y: 200 },
                ]
            },
            {
                name: "Meta-Cognition",
                color: "#ec4899",
                nodes: [
                    { id: "meta1", title: "Neurodivergent Framework", desc: "Ideation system for AuDHD brains", tags: ["framework", "neurodivergent"], x: 0, y: 0 },
                    { id: "meta2", title: "Idea Cosmos", desc: "Non-linear exploration interface (this!)", tags: ["visualization", "interface"], x: -80, y: -30 },
                    { id: "meta3", title: "Project Board", desc: "Trello-style unfinished work tracker", tags: ["tracking", "boards"], x: 80, y: 40 },
                ]
            }
        ];
        
        // Flatten nodes with cluster info
        const allNodes = clusters.flatMap(c => c.nodes.map(n => ({ ...n, cluster: c.name, clusterColor: c.color })));
        
        // Create connections based on shared tags
        const connections = [];
        for (let i = 0; i < allNodes.length; i++) {
            for (let j = i + 1; j < allNodes.length; j++) {
                const sharedTags = allNodes[i].tags.filter(t => allNodes[j].tags.includes(t));
                if (sharedTags.length > 0) {
                    connections.push({
                        from: allNodes[i],
                        to: allNodes[j],
                        strength: sharedTags.length,
                        tags: sharedTags
                    });
                }
            }
        }
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function worldToScreen(x, y) {
            return {
                x: (x - camera.x) * camera.zoom + width / 2,
                y: (y - camera.y) * camera.zoom + height / 2
            };
        }
        
        function screenToWorld(x, y) {
            return {
                x: (x - width / 2) / camera.zoom + camera.x,
                y: (y - height / 2) / camera.zoom + camera.y
            };
        }
        
        function drawConstellation() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);
            
            // Draw subtle grid
            ctx.strokeStyle = 'rgba(99, 102, 241, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 100 * camera.zoom;
            const offsetX = (-camera.x * camera.zoom + width / 2) % gridSize;
            const offsetY = (-camera.y * camera.zoom + height / 2) % gridSize;
            
            for (let x = offsetX; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = offsetY; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Draw connections (constellation lines)
            connections.forEach(conn => {
                const from = worldToScreen(conn.from.x, conn.from.y);
                const to = worldToScreen(conn.to.x, conn.to.y);
                
                // Check if either node is hovered
                const isHighlighted = hoveredNode && (conn.from === hoveredNode || conn.to === hoveredNode);
                
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                
                if (isHighlighted) {
                    ctx.strokeStyle = `rgba(167, 139, 250, ${0.6 + conn.strength * 0.2})`;
                    ctx.lineWidth = 2 * camera.zoom;
                    ctx.stroke();
                    
                    // Draw shared tags on the line
                    const midX = (from.x + to.x) / 2;
                    const midY = (from.y + to.y) / 2;
                    ctx.fillStyle = 'rgba(167, 139, 250, 0.8)';
                    ctx.font = `${10 * camera.zoom}px sans-serif`;
                    ctx.fillText(conn.tags[0], midX, midY);
                } else if (showTrails) {
                    ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * conn.strength})`;
                    ctx.lineWidth = 1 * camera.zoom;
                    ctx.stroke();
                }
            });
            
            // Draw nodes
            allNodes.forEach(node => {
                const pos = worldToScreen(node.x, node.y);
                const isHovered = node === hoveredNode;
                const radius = isHovered ? 12 * camera.zoom : 8 * camera.zoom;
                
                // Glow effect
                if (isHovered) {
                    const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius * 3);
                    gradient.addColorStop(0, node.clusterColor + '80');
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, radius * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Node circle
                ctx.fillStyle = node.clusterColor;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner dot
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                // Label (show if hovered or zoomed in)
                if (isHovered || camera.zoom > 1.2) {
                    ctx.fillStyle = '#fff';
                    ctx.font = `${isHovered ? 14 : 11}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(node.title, pos.x, pos.y + radius + 20);
                }
            });
            
            // Draw cluster labels
            clusters.forEach(cluster => {
                const centerX = cluster.nodes.reduce((s, n) => s + n.x, 0) / cluster.nodes.length;
                const centerY = cluster.nodes.reduce((s, n) => s + n.y, 0) / cluster.nodes.length;
                const pos = worldToScreen(centerX, centerY - 80);
                
                ctx.fillStyle = cluster.color + '60';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(cluster.name, pos.x, pos.y);
            });
        }
        
        function animate() {
            drawConstellation();
            requestAnimationFrame(animate);
        }
        
        // Mouse handling
        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            dragStart = { x: e.clientX, y: e.clientY };
            instructions.classList.remove('visible');
        });
        
        canvas.addEventListener('mousemove', e => {
            if (isDragging) {
                const dx = (e.clientX - dragStart.x) / camera.zoom;
                const dy = (e.clientY - dragStart.y) / camera.zoom;
                camera.x -= dx;
                camera.y -= dy;
                dragStart = { x: e.clientX, y: e.clientY };
            }
            
            // Find hovered node
            const worldPos = screenToWorld(e.clientX, e.clientY);
            let closest = null;
            let closestDist = Infinity;
            
            allNodes.forEach(node => {
                const dist = Math.hypot(node.x - worldPos.x, node.y - worldPos.y);
                if (dist < 30 / camera.zoom && dist < closestDist) {
                    closest = node;
                    closestDist = dist;
                }
            });
            
            hoveredNode = closest;
            
            if (hoveredNode) {
                document.getElementById('hover-title').textContent = hoveredNode.title;
                document.getElementById('hover-desc').textContent = hoveredNode.desc;
                const tagsHtml = hoveredNode.tags.map(t => `<span style="background: rgba(99,102,241,0.3); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem;">${t}</span>`).join('');
                document.getElementById('hover-tags').innerHTML = tagsHtml;
                hoverInfo.classList.add('visible');
            } else {
                hoverInfo.classList.remove('visible');
            }
        });
        
        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            hoverInfo.classList.remove('visible');
        });
        
        // Zoom with wheel
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            camera.zoom *= zoomFactor;
            camera.zoom = Math.max(0.3, Math.min(5, camera.zoom));
        }, { passive: false });
        
        // Touch support
        let lastTouchDist = 0;
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                lastTouchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            } else if (e.touches.length === 1) {
                isDragging = true;
                dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        });
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const zoomFactor = dist / lastTouchDist;
                camera.zoom *= zoomFactor;
                camera.zoom = Math.max(0.3, Math.min(5, camera.zoom));
                lastTouchDist = dist;
            } else if (e.touches.length === 1 && isDragging) {
                const dx = (e.touches[0].clientX - dragStart.x) / camera.zoom;
                const dy = (e.touches[0].clientY - dragStart.y) / camera.zoom;
                camera.x -= dx;
                camera.y -= dy;
                dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: false });
        
        // Controls
        function resetView() {
            camera = { x: 0, y: 0, zoom: 1 };
        }
        
        function toggleTrails() {
            showTrails = !showTrails;
        }
        
        function randomJump() {
            const randomNode = allNodes[Math.floor(Math.random() * allNodes.length)];
            camera.x = randomNode.x;
            camera.y = randomNode.y;
            camera.zoom = 2;
            hoveredNode = randomNode;
        }
        
        // Init
        window.addEventListener('resize', resize);
        resize();
        animate();
        
        // Hide instructions after 5 seconds
        setTimeout(() => instructions.classList.remove('visible'), 5000);
    </script>
</body>
</html>
